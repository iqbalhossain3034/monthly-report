<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>মাসিক অগ্রিম কর্মসূচি</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ink:#1b2430;
    --paper:#f3f6fb;
    --paper-line:#d8e0ec;
    --green-deep:#123a5e;
    --green-mid:#2f6690;
    --green-soft:#e2ebf5;
    --gold:#b5651d;
    --gold-soft:#f6e6d6;
    --red:#a13d3d;
    --red-soft:#f6e3e0;
    --shadow:0 1px 2px rgba(18,58,94,.07),0 8px 24px rgba(18,58,94,.09);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans Bengali','Hind Siliguri','Vrinda','SolaimanLipi',system-ui,sans-serif;
    font-size:14px;
    line-height:1.5;
  }
  .app{max-width:min(2000px, 98vw);margin:0 auto;padding:20px 18px 60px;}

  .letterhead{
    display:flex;align-items:center;gap:16px;
    background:linear-gradient(135deg,var(--green-deep),var(--green-mid));
    color:#f4efdf;border-radius:14px;padding:18px 22px;box-shadow:var(--shadow);
  }
  .seal{
    width:52px;height:52px;border-radius:50%;border:2px solid #d8c48e;
    display:flex;align-items:center;justify-content:center;
    font-family:'Noto Serif Bengali',serif;font-weight:700;font-size:20px;
    color:#f4efdf;flex:0 0 auto;
    background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.12), transparent 60%);
  }
  .letterhead h1{font-family:'Noto Serif Bengali',serif;font-size:19px;margin:0 0 2px;font-weight:700;letter-spacing:.2px;}
  .letterhead p{margin:0;font-size:12.5px;opacity:.85;}

  .tabs{display:flex;gap:6px;margin:18px 0 16px;flex-wrap:wrap;}
  .tab-btn{
    border:1px solid var(--paper-line);background:#fff;color:var(--green-deep);
    padding:9px 16px;border-radius:999px;font-size:13.5px;cursor:pointer;font-weight:600;transition:.15s;
  }
  .tab-btn:hover{border-color:var(--green-mid);}
  .tab-btn.active{background:var(--green-deep);border-color:var(--green-deep);color:#f4efdf;}

  .card{background:#fff;border:1px solid var(--paper-line);border-radius:14px;padding:20px;box-shadow:var(--shadow);margin-bottom:18px;}
  .card h2{font-family:'Noto Serif Bengali',serif;font-size:16px;margin:0 0 14px;color:var(--green-deep);border-bottom:2px solid var(--green-soft);padding-bottom:8px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;}
  label{display:block;font-size:12px;color:#5a5648;margin-bottom:4px;font-weight:600;}
  input[type=text],input[type=number],input[type=month],input[type=date],select,textarea{
    width:100%;padding:8px 10px;border:1px solid var(--paper-line);border-radius:8px;
    font-family:inherit;font-size:13.5px;background:#fffdf8;color:var(--ink);
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--green-mid);outline-offset:1px;}
  .field{margin-bottom:10px;}
  .hint{font-size:11px;color:#8a8471;margin-top:3px;}
  .btn{border:none;border-radius:9px;padding:9px 18px;font-weight:700;font-size:13.5px;cursor:pointer;transition:.15s;font-family:inherit;}
  .btn-primary{background:var(--green-deep);color:#f4efdf;}
  .btn-primary:hover{background:var(--green-mid);}
  .btn-gold{background:var(--gold-soft);color:var(--gold);border:1px solid var(--gold);}
  .btn-gold:hover{background:var(--gold);color:#fff;}
  .btn-outline{background:#fff;border:1px solid var(--paper-line);color:var(--ink);}
  .btn-outline:hover{border-color:var(--green-mid);}
  .btn-danger{background:var(--red-soft);color:var(--red);border:1px solid var(--red);}
  .btn-sm{padding:5px 10px;font-size:12px;border-radius:7px;}
  .row-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}

  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th,td{border:1px solid var(--paper-line);padding:6px 6px;text-align:center;vertical-align:middle;}
  thead th{background:var(--green-soft);color:var(--green-deep);font-weight:700;font-size:11px;}
  .select-col select{font-size:11.5px;width:100%;}
  .select-col{min-width:90px;}
  .remark-col{min-width:230px;}
  .village-col{min-width:105px;}
  .owner-col{min-width:190px;}
  tbody tr:nth-child(even){background:#fbf9f2;}
  tbody tr.off-day{background:#c7c7c2!important;}
  tbody tr.off-day td{color:#3a3a36;}
  tbody tr:focus-within{background:#d3e3f7!important;box-shadow:inset 3px 0 0 var(--green-mid);}
  tbody tr:focus-within td{color:var(--green-deep);font-weight:600;}
  tbody tr.active-row{background:#d3e3f7!important;box-shadow:inset 3px 0 0 var(--green-mid);}
  tbody tr.active-row td{color:var(--green-deep);font-weight:600;}
  td select, td input{font-size:12px;padding:5px 4px;min-width:64px;}
  .badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;}
  .badge.ok{background:var(--green-soft);color:var(--green-deep);}
  .badge.pending{background:var(--gold-soft);color:var(--gold);}
  .muted{color:#8a8471;}
  .top-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--green-deep);color:#f4efdf;padding:10px 20px;border-radius:999px;
    font-size:13px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;
    transition:opacity .25s, transform .25s;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
  .history-list{display:flex;flex-direction:column;gap:8px;}
  .history-item{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--paper-line);border-radius:10px;padding:10px 14px;background:#fffdf8;}
  .history-item strong{font-family:'Noto Serif Bengali',serif;}
  .search-box{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:flex-end;}
  .search-box input,.search-box select{max-width:220px;}
  .empty{text-align:center;color:#8a8471;padding:26px 10px;font-size:13px;}
  .setup-table td{text-align:left;}
  .setup-table th{white-space:nowrap;}
  .footer-note{font-size:11px;color:#8a8471;text-align:center;margin-top:28px;}
  .select-col{background:#f1efe4;border-left:2px dashed #b8ab7e!important;}
  thead th.select-col{background:#e9e2c9;color:#7a6f4a;}
  .report-head{margin-bottom:14px;}
  .report-head-title{font-family:'Noto Serif Bengali',serif;font-size:14px;line-height:1.6;text-align:center;}
  .report-head-month{font-size:13px;display:inline-block;margin-top:4px;}
  .report-worker{display:flex;justify-content:space-between;gap:20px;font-size:13px;margin-bottom:14px;line-height:1.8;flex-wrap:wrap;}
  .report-note{font-size:11.5px;color:#5a5648;margin:14px 0 20px;}
  .report-sign{font-size:13px;line-height:1.9;text-align:right;}
  .center-table input{min-width:60px;}
  .print-only{display:none;}
  td input[type="text"]{width:100%;border:1px solid #d8d2bd;border-radius:5px;padding:3px 6px;font:inherit;background:#fff;}
  @media print{
    @page{ size:A4 portrait; margin:6mm; }
    .tabs,.top-bar,.row-actions,.no-print,.letterhead,.footer-note{display:none!important;}
    body{background:#fff;font-size:9px;}
    .app{max-width:100%;padding:0;}
    .card{box-shadow:none;border:none;padding:0;margin:0;}
    select.no-print{display:none!important;}
    .report-head{margin-bottom:8px;}
    .report-head-title{font-size:12px;line-height:1.35;}
    .report-head-month{font-size:11px;}
    .report-worker{font-size:10.5px;margin-bottom:8px;line-height:1.5;}
    .report-note{font-size:9px;margin:8px 0 12px;}
    .report-sign{font-size:10.5px;line-height:1.5;}
    table{font-size:12.5px;table-layout:fixed;width:100%;border:1px solid #000;}
    /* স্ক্রিনের জন্য নির্ধারিত min-width গুলো প্রিন্টে বাতিল — নাহলে <colgroup>-এর নির্দিষ্ট
       শতাংশ-ভিত্তিক প্রস্থের সাথে সংঘর্ষ বেঁধে কলাম একে অপরের উপর উঠে যায় (ওভারল্যাপ) */
    .select-col,.remark-col,.village-col,.owner-col{min-width:0!important;}
    td.remark-col{text-align:center;}
    .table-wrap{border:1.25px solid #000;padding:2px;}
    thead th{font-size:9px;font-weight:400;line-height:1.15;padding:3px 2px;background:#e8e8e8!important;color:#000!important;}
    th,td{padding:3px 4px;line-height:1.25;word-break:break-word;border:0.5px solid #555;vertical-align:middle;}
    tbody tr:nth-child(even){background:#fff!important;}
    .print-only{display:inline;white-space:normal;word-break:break-word;}
    .muted{color:#000;font-weight:700;}
    td input[type="text"]{border:none;}
    /* যেকোনো "সর্বশেষ নির্বাচিত সারি" সবুজ হাইলাইট প্রিন্ট/PDF-এ কখনোই দেখানো হবে না */
    tbody tr.active-row,tbody tr:focus-within{background:transparent!important;box-shadow:none!important;}
    tbody tr.active-row td,tbody tr:focus-within td{color:inherit!important;font-weight:inherit!important;}
    /* প্রতিটি ঘরের প্রকৃত ফন্ট-সাইজ/wrap (autofitCells) এবং প্রতিটি সারির উচ্চতা (stretchRowsToFillPage)
       আগে থেকে মেপে --fit-size/--fit-wrap/--row-h কাস্টম প্রপার্টি হিসেবে বসানো থাকে; সেট করা না থাকলে যুক্তিসঙ্গত ডিফল্টে ফিরে যাবে */
    tbody td{font-size:var(--fit-size, 12.5px);white-space:var(--fit-wrap, nowrap);}
    tbody tr{height:var(--row-h, auto);}
    /* কলাম-প্রস্থ এখন উপরের <colgroup>-এ নির্ধারিত (গ্রুপ-হেডারসহ সঠিকভাবে কাজ করার জন্য) */
    tbody tr{page-break-inside:avoid;}
    thead{display:table-header-group;}
  }
  /* উপরের @media print রুলের হুবহু প্রতিরূপ, কিন্তু ক্লাস হিসেবে —
     PDF এক্সপোর্টের সময় html2canvas এই ক্লাসটা ব্যবহার করে ঠিক প্রিন্টের মতোই এক-পাতার কম্প্যাক্ট লেআউট ক্যাপচার করে */
  .pdf-export-mode{background:#fff;font-size:9px;}
  .pdf-export-mode .app{max-width:100%;padding:0;}
  .pdf-export-mode .tabs,.pdf-export-mode .top-bar,.pdf-export-mode .row-actions,
  .pdf-export-mode .no-print,.pdf-export-mode .letterhead,.pdf-export-mode .footer-note{display:none!important;}
  .pdf-export-mode .card{box-shadow:none;border:none;padding:0;margin:0;}
  .pdf-export-mode select.no-print{display:none!important;}
  .pdf-export-mode .report-head{margin-bottom:8px;}
  .pdf-export-mode .report-head-title{font-size:12px;line-height:1.35;}
  .pdf-export-mode .report-head-month{font-size:11px;}
  .pdf-export-mode .report-worker{font-size:10.5px;margin-bottom:8px;line-height:1.5;}
  .pdf-export-mode .report-note{font-size:9px;margin:8px 0 12px;}
  .pdf-export-mode .report-sign{font-size:10.5px;line-height:1.5;}
  .pdf-export-mode table{font-size:12.5px;table-layout:fixed;width:100%;border:1px solid #000;}
  .pdf-export-mode .select-col,.pdf-export-mode .remark-col,.pdf-export-mode .village-col,.pdf-export-mode .owner-col{min-width:0!important;}
  .pdf-export-mode td.remark-col{text-align:center;}
  .pdf-export-mode .table-wrap{border:1.25px solid #000;padding:2px;}
  .pdf-export-mode thead th{font-size:9px;font-weight:400;line-height:1.15;padding:3px 2px;background:#e8e8e8!important;color:#000!important;}
  .pdf-export-mode th,.pdf-export-mode td{padding:3px 4px;line-height:1.25;word-break:break-word;border:0.15px solid #000;vertical-align:middle;}
  .pdf-export-mode tbody tr:nth-child(even){background:#fff!important;}
  .pdf-export-mode tbody tr.active-row,.pdf-export-mode tbody tr:focus-within{background:transparent!important;box-shadow:none!important;}
  .pdf-export-mode tbody tr.active-row td,.pdf-export-mode tbody tr:focus-within td{color:inherit!important;font-weight:inherit!important;}
  .pdf-export-mode .print-only{display:inline;white-space:normal;word-break:break-word;}
  .pdf-export-mode .muted{color:#000;font-weight:700;}
  .pdf-export-mode td input[type="text"]{border:none;}
  /* প্রিন্টের মতোই — autofitCells/stretchRowsToFillPage-এর হিসাব এখান থেকেই আসল ফন্ট/উচ্চতা নির্ধারণ করে */
  .pdf-export-mode tbody td{font-size:var(--fit-size, 12.5px);white-space:var(--fit-wrap, nowrap);}
  .pdf-export-mode tbody tr{height:var(--row-h, auto);}
  /* কলাম-প্রস্থ এখন <colgroup>-এ নির্ধারিত */
  @media (max-width:640px){
    .letterhead{flex-direction:column;text-align:center;}
    table{font-size:11px;}
  }
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   হেল্পার
========================================================= */
const BN_DIGIT = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
function bnNum(n){ return String(n).replace(/[0-9]/g, d=>BN_DIGIT[d]); }
const BN_DAYS = ['রবি','সোম','মঙ্গল','বুধ','বৃহস্পতি','শুক্র','শনি'];
const BN_MONTHS = ['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];
const EN_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function reportFileBaseName(ym){
  const [y,mm] = ym.split('-').map(Number);
  return `Monthly Report- ${EN_MONTHS[mm-1]} ${y}`;
}
function isoDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function daysInMonth(y,m){ return new Date(y, m+1, 0).getDate(); }
function esc(s){ return (s===undefined||s===null)?'':String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* =========================================================
   ডিফল্ট ছুটির তালিকা (Public Holidays / Database শিট থেকে) —
   এখন এটা সম্পূর্ণ এডিটেবল, "ছুটির তালিকা" ট্যাব থেকে যোগ/বাদ/পরিবর্তন করা যাবে
========================================================= */
function defaultHolidays(){

    ['2026-02-04','শবে বরাত'],['2026-02-21','শহীদ দিবস ও আন্তর্জাতিক মাতৃভাষা দিবস'],['2026-03-18','শবে কদর'],
    ['2026-03-20','জুমাতুল বিদা'],['2026-03-20','ঈদুল ফিতর (ছুটি)'],['2026-03-21','ঈদুল ফিতর'],['2026-03-22','ঈদুল ফিতর (ছুটি)'],
    ['2026-03-23','ঈদুল ফিতর (ছুটি)'],['2026-03-26','স্বাধীনতা ও জাতীয় দিবস'],['2026-04-14','বাংলা নববর্ষ'],
    ['2026-05-01','মে দিবস'],['2026-05-01','বুদ্ধ পূর্ণিমা (বৈশাখী পূর্ণিমা)'],['2026-05-25','ঈদুল আজহার ছুটি'],
    ['2026-05-26','ঈদুল আজহার ছুটি'],['2026-05-27','ঈদুল আজহার ছুটি'],['2026-05-28','ঈদুল আজহা'],
    ['2026-05-29','ঈদুল আজহার ছুটি'],['2026-05-30','ঈদুল আজহার ছুটি'],['2026-06-26','আশুরা'],
    ['2026-08-05','জুলাই অভ্যুত্থান দিবস'],['2026-08-26','ঈদে মিলাদুন্নবী (সা.)'],['2026-09-04','শুভ জন্মাষ্টমী'],
    ['2026-10-20','দুর্গাপূজা (মহানবমী)'],['2026-10-21','দুর্গাপূজা (বিজয়া দশমী)'],['2026-12-16','বিজয় দিবস'],['2026-12-25','বড়দিন'],
    ['2027-01-24','শবে বরাত'],['2027-02-21','শহীদ দিবস ও আন্তর্জাতিক মাতৃভাষা দিবস'],['2027-03-05','জুমাতুল বিদা'],
    ['2027-03-06','শবে কদর'],['2027-03-09','ঈদুল ফিতর'],['2027-03-10','ঈদুল ফিতর (ছুটি)'],['2027-03-11','ঈদুল ফিতর (ছুটি)'],
    ['2027-03-26','স্বাধীনতা ও জাতীয় দিবস'],['2027-04-14','বাংলা নববর্ষ'],['2027-05-01','মে দিবস'],
    ['2027-05-16','ঈদুল আজহা'],['2027-05-17','ঈদুল আজহার ছুটি'],['2027-05-18','ঈদুল আজহার ছুটি'],
    ['2027-05-20','বুদ্ধ পূর্ণিমা'],['2027-06-15','আশুরা'],['2027-08-15','ঈদে মিলাদুন্নবী (সা.)'],
    ['2027-08-24','শুভ জন্মাষ্টমী'],['2027-10-10','বিজয়া দশমী'],['2027-12-16','বিজয় দিবস'],['2027-12-25','বড়দিন'],
  ];
  return raw.map(([date,name],i)=>({id:'h'+(i+1), date, name}));
}

/* =========================================================
   ডিফল্ট কেন্দ্র তালিকা (Center details শিট, ২৪টি সারি — আপনার
   আসল আগস্ট-২০২৬ জমাকৃত রিপোর্ট থেকে যাচাই করা তথ্য)
========================================================= */
function defaultCenterRows(){
  const raw = [

function parseRange(s){
  const m = String(s||'').match(/(\d+)\s*-\s*(\d+)/);
  if(!m) return {from:0,to:0};
  return {from:parseInt(m[1]), to:parseInt(m[2])};
}

// পুরনো সংস্করণের ব্রাউজার-ডেটা (v1/v2, যেখানে কেন্দ্র তালিকা ও ছুটি এডিট করা যেত না)
// থাকলে সেটাকে নতুন কাঠামোতে (v3, সম্পূর্ণ এডিটেবল) রূপান্তর করে — এন্ট্রি/ইতিহাস অক্ষুণ্ণ থাকে
function migrateState(state){
  if(state.version === DATA_VERSION) return state;
  if(!state.worker) state.worker = defaultState().worker;
  if(!state.worker.union) state.worker.union = 'সদাসদী';

  if(!state.centerRows){
    if(state.blocks && state.blocks.length){
      let rows = []; let id=1;
      state.blocks.forEach(b=>{
        const r1=parseRange(b.ipc1), r2=parseRange(b.ipc2), r3=parseRange(b.epi);
        rows.push({id:'c'+(id++), mouzaNo:b.mouzaNo, mouzaName:b.mouzaName, villageName:b.villageName, houseFrom:r1.from, houseTo:r1.to, newC:0, cancelC:0, blockNo:b.code, ownerName:b.ownerName, purpose:'IPC', note:''});
        rows.push({id:'c'+(id++), mouzaNo:b.mouzaNo, mouzaName:b.mouzaName, villageName:b.villageName, houseFrom:r2.from, houseTo:r2.to, newC:0, cancelC:0, blockNo:b.code, ownerName:b.ownerName, purpose:'IPC', note:'A'});
        rows.push({id:'c'+(id++), mouzaNo:b.mouzaNo, mouzaName:b.mouzaName, villageName:b.villageName, houseFrom:r3.from, houseTo:r3.to, newC:0, cancelC:0, blockNo:b.code, ownerName:b.ownerName, purpose:'EPI', note:''});
      });
      state.centerRows = rows;
      state.nextRowId = id;
      delete state.blocks;
    } else {
      state.centerRows = defaultCenterRows();
      state.nextRowId = 25;
    }
  }
  if(!state.holidays){
    state.holidays = defaultHolidays();
    state.nextHolidayId = 49;
  }
  if(!state.auth || !state.auth.admin){
    const old = state.auth || {};
    state.auth = {
      admin:{ username:'Iqbal', password:'1722', email: old.adminEmail || 'iqbal.hossain@3034.com' },
      user:{ username: old.username || 'Shimul', password: old.password || '1722', email: old.userEmail || 'shimulmai1722@gmail.com' }
    };
  }
  if(state.nextRowId===undefined) state.nextRowId = (state.centerRows.length||24)+1;
  if(state.nextHolidayId===undefined) state.nextHolidayId = (state.holidays.length||48)+1;
  state.version = DATA_VERSION;
  return state;
}

let SUPPRESS_NEXT_SNAPSHOT = false; // নিজের করা লেখা নিজেই যেন আবার প্রসেস না করে (পুনরাবৃত্তি এড়াতে)
let fbSyncTimer = null;
let FIREBASE_STATUS = 'connecting'; // 'connecting' | 'online' | 'offline'

function initFirebase(){
  if(!(window.firebase && firebase.initializeApp)){
    setTimeout(initFirebase, 400); // SDK তখনও লোড না হয়ে থাকলে একটু পর আবার চেষ্টা
    return;
  }
  try{
    firebase.initializeApp(firebaseConfig);
    fbDb = firebase.firestore();
    fbDocRef = fbDb.collection('app_data').doc('shared_state');
    fbReady = true;
    listenFirebase();
  }catch(e){
    console.error('firebase init failed', e);
    FIREBASE_STATUS = 'offline';
  }
}

function listenFirebase(){
  if(!fbReady) return;
  fbDocRef.onSnapshot((doc)=>{
    FIREBASE_STATUS = 'online';
    if(SUPPRESS_NEXT_SNAPSHOT){ SUPPRESS_NEXT_SNAPSHOT = false; return; }
    if(doc.exists && doc.data() && doc.data().json){
      try{
        STATE = migrateState(JSON.parse(doc.data().json));
        localStorage.setItem(STORAGE_KEY, doc.data().json);
        render();
      }catch(e){ console.error('snapshot parse failed', e); }
    } else {
      // ক্লাউডে এখনো কিছু নেই — শুধু তখনই বর্তমান লোকাল ডেটা পাঠানো হবে যদি সত্যিই কিছু থাকে;
      // একটা একদম খালি ব্রাউজার যেন ভুল করে খালি ডেটা পাঠিয়ে অন্য কারো আসল ডেটা মুছে না দেয়
      const hasRealData = STATE && STATE.entries && Object.keys(STATE.entries).length > 0;
      if(hasRealData) pushToFirebase();
    }
  }, (err)=>{
    console.error('firestore listen failed', err);
    FIREBASE_STATUS = 'offline';
  });
}

function scheduleFirebaseSync(){
  if(!fbReady){ setTimeout(scheduleFirebaseSync, 400); return; } // Firebase তখনও প্রস্তুত না হলে একটু পর আবার চেষ্টা, যেন কোনো সংরক্ষণ হারিয়ে না যায়
  clearTimeout(fbSyncTimer);
  fbSyncTimer = setTimeout(pushToFirebase, 500);
}

async function pushToFirebase(){
  if(!fbReady) return;
  try{
    SUPPRESS_NEXT_SNAPSHOT = true;
    await fbDocRef.set({
      json: JSON.stringify(STATE),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    FIREBASE_STATUS = 'online';
  }catch(e){
    console.error('firebase push failed', e);
    SUPPRESS_NEXT_SNAPSHOT = false;
    FIREBASE_STATUS = 'offline';
  }
}

async function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
    LAST_SAVE_ERROR = null;
    scheduleFirebaseSync();
    return true;
  }catch(e){
    console.error('save failed', e);
    if(e && e.name==='QuotaExceededError'){
      LAST_SAVE_ERROR = 'ব্রাউজারের সংরক্ষণ জায়গা পূর্ণ হয়ে গেছে (QuotaExceededError) — পুরনো ব্যাকআপ ডাউনলোড করে কিছু ডেটা মুছে ফেলুন';
    } else {
      LAST_SAVE_ERROR = (e && e.message) ? e.message : 'অজানা ত্রুটি';
    }

  }

/* ---------------- কেন্দ্র লুকআপ ---------------- */
function centerLabel(r){
  return `${r.blockNo||''}${r.note?(' '+r.note):''} ${r.purpose||''}`.replace(/\s+/g,' ').trim();
}
function categoryList(){
  const set = new Set();
  STATE.centerRows.forEach(r=>{ if(r.purpose) set.add(r.purpose); });
  set.add('IPC'); set.add('EPI');
  const list = [...set].filter(p=>p!=='সি সি সেবা').sort((a,b)=> (a==='IPC'?-2:a==='EPI'?-1:0) - (b==='IPC'?-2:b==='EPI'?-1:0) || a.localeCompare(b));
  list.push('সি সি সেবা');
  return list;
}
function optionsForCategory(cat){
  if(cat==='সি সি সেবা') return ['সি সি সেবা','----'];
  const opts = STATE.centerRows.filter(r=>r.purpose===cat).map(centerLabel);
  opts.push('----');
  return opts;
}
function lookupByCode(code){
  if(!code || code==='----' || code==='সি সি সেবা') return null;
  const row = STATE.centerRows.find(r=>centerLabel(r)===code);
  if(!row) return null;
  const total = (Number(row.houseTo||0)-Number(row.houseFrom||0)+1) + Number(row.newC||0) - Number(row.cancelC||0);
  return {row, total};
}

function buildMonthRows(ym, category){
  const [y,m] = ym.split('-').map(Number);
  const n = daysInMonth(y, m-1);
  const rows = [];
  for(let d=1; d<=n; d++){
    const iso = isoDate(new Date(y, m-1, d));
    rows.push({date:iso, code:'', remark:''});
  }
  return {category: category||'IPC', rows};
}
function getMonthEntry(ym){
  if(!STATE.entries[ym]) STATE.entries[ym] = buildMonthRows(ym, 'IPC');
  return STATE.entries[ym];
}

function doPasswordReset(){
  const email = document.getElementById('recoveryEmail').value.trim().toLowerCase();
  const newPass = document.getElementById('recoveryNewPass').value;
  let account = null;
  if(email === STATE.auth.admin.email.toLowerCase()) account = STATE.auth.admin;
  else if(email === STATE.auth.user.email.toLowerCase()) account = STATE.auth.user;
  if(!account){ SHOW_FORGOT=true; renderLogin('এই ইমেইলটি নিবন্ধিত নয়'); return; }
  if(!newPass){ SHOW_FORGOT=true; renderLogin('নতুন পাসওয়ার্ড দিন'); return; }
  account.password = newPass;
  saveState();
  SHOW_FORGOT = false;
  toast('পাসওয়ার্ড রিসেট হয়েছে, এখন লগইন করুন');
  renderLogin();
}
function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if(u===STATE.auth.admin.username && p===STATE.auth.admin.password){
    AUTHENTICATED = true; CURRENT_ROLE = 'admin';
    render();
  } else if(u===STATE.auth.user.username && p===STATE.auth.user.password){
    AUTHENTICATED = true; CURRENT_ROLE = 'user';
    render();
  } else {
    renderLogin('ইউজারনেম বা পাসওয়ার্ড সঠিক নয়');
  }
}
function doLogout(){ AUTHENTICATED = false; CURRENT_ROLE=null; SHOW_FORGOT=false; renderLogin(); }

function tabBtn(id,label){ return `<button class="tab-btn ${ACTIVE_TAB===id?'active':''}" onclick="setTab('${id}')">${label}</button>`; }
function setTab(id){ ACTIVE_TAB=id; render(); }
function renderTab(){

function changeMonth(v){ CURRENT_MONTH = v; renderTab(); }
function changeCategory(v){ getMonthEntry(CURRENT_MONTH).category = v; saveState(); renderTab(); }
async function updateRow(idx, field, val){
  const entry = getMonthEntry(CURRENT_MONTH);
  entry.rows[idx][field] = val;
  entry.activeIdx = idx;
  SAVING_IN_PROGRESS = true;
  await saveState();
  SAVING_IN_PROGRESS = false;
  renderTab();
}
function fillRemarks(){
  const entry = getMonthEntry(CURRENT_MONTH);
  const hMap = holidayMap();
  let count=0;
  entry.rows.forEach(row=>{
    const d = new Date(row.date+'T00:00:00');
    const holiday = hMap[row.date];
    if(holiday && !row.remark){ row.remark = holiday; count++; }
    else if(d.getDay()===5 && !row.remark){ row.remark = 'সাপ্তাহিক ছুটি (শুক্রবার)'; count++; }
  });
  saveState(); renderTab();
  toast(count+' টি সারিতে মন্তব্য বসানো হয়েছে');
}
function clearMonth(){
  if(STATE.submitted[CURRENT_MONTH]){
    toast('⚠ এই মাসের রিপোর্ট জমা দেওয়া আছে, তাই Clear কাজ করবে না। মুছতে হলে আগে "জমা বাতিল করুন" চাপুন।', 5000);
    return;
  }
  if(!confirm('এই মাসের সব সিলেকশন ও মন্তব্য মুছে ফেলা হবে। আপনি কি নিশ্চিত?')) return;
  getMonthEntry(CURRENT_MONTH).rows.forEach(row=>{ row.code=''; row.remark=''; });
  saveState(); renderTab();
  toast('এই মাসের সব তথ্য মুছে ফেলা হয়েছে');
}
let SAVING_IN_PROGRESS = false;

/* ================= প্রতিটি ঘরের লেখা মেপে প্রয়োজনমতো ফন্ট ছোট করা (এক্সেলের "Shrink to fit") =================
   এই পুরো হিসাবটা স্ক্রিনের বাইরে (অদৃশ্য) একটা কপির উপর করা হয়, তাই আসল পাতায় কোনো
   পরিবর্তন/ফ্লিকার দেখা যায় না — শুধু প্রিন্ট/PDF আউটপুটেই এর প্রভাব পড়ে। */
function buildOffscreenClone(){
  const sheet = document.getElementById('reportSheet');
  if(!sheet) return null;
  const clone = sheet.cloneNode(true);
  clone.removeAttribute('id');
  clone.style.width = '198mm';
  clone.style.maxWidth = '198mm';
  const wrap = document.createElement('div');
  wrap.className = 'pdf-export-mode';
  wrap.style.cssText = 'position:fixed;top:0;left:-10000px;background:#fff;pointer-events:none;';
  wrap.appendChild(clone);
  document.body.appendChild(wrap);
  return { wrap, clone };
}
function autofitCells(root){
  // ধাপ ১: কলাম ১-১৪ এর সব ঘরের জন্য একটামাত্র অভিন্ন ফন্ট সাইজ বের করা (রো-ভিত্তিতে আলাদা নয়) —
  // এতে প্রতিটি সাধারণ সারির উচ্চতা সমান থাকে, কোনো সারি বাকিগুলোর চেয়ে চিকন/মোটা দেখায় না
  const rows = Array.from(root.querySelectorAll('table tbody tr'));
  const mainCellsByRow = rows.map(row=>Array.from(row.querySelectorAll('td:not(.select-col)')).slice(0,14));
  const allMainCells = mainCellsByRow.flat();
  const MAIN_MAX = 12.5, MAIN_MIN = 7.5;
  let size = MAIN_MAX;
  allMainCells.forEach(td=>{ td.style.whiteSpace='nowrap'; td.style.fontSize=size+'px'; });
  let guard = 0;
  while(allMainCells.some(td=>td.scrollWidth > td.clientWidth) && size > MAIN_MIN && guard < 20){
    size -= 0.5;
    allMainCells.forEach(td=>{ td.style.fontSize = size+'px'; });
    guard++;
  }
  // ধাপ ২: মন্তব্য কলাম — একই অভিন্ন সাইজ দিয়ে চেষ্টা; শুধু যে নির্দিষ্ট সারিতে না আঁটবে,
  // কেবল সেই একটা ঘরই আলাদাভাবে আরেকটু ছোট হবে বা প্রয়োজনে দুই লাইনে যাবে
  const results = [];
  rows.forEach((row,ri)=>{
    const cells = Array.from(row.querySelectorAll('td:not(.select-col)'));
    const rowResult = mainCellsByRow[ri].map(()=>({size, wrapMode:'nowrap'}));
    const remarkTd = cells[14];
    if(remarkTd){
      let rSize = size;
      remarkTd.style.whiteSpace = 'nowrap';
      remarkTd.style.fontSize = rSize + 'px';
      let g = 0;
      while(remarkTd.scrollWidth > remarkTd.clientWidth && rSize > 6.5 && g < 20){
        rSize -= 0.5;
        remarkTd.style.fontSize = rSize + 'px';
        g++;
      }
      let wrapMode = 'nowrap';
      if(remarkTd.scrollWidth > remarkTd.clientWidth){
        wrapMode = 'normal';
        remarkTd.style.whiteSpace = 'normal';
      }
      rowResult.push({size:rSize, wrapMode});
    }
    results.push(rowResult);
  });
  return results;
}
function applyFitResultsToLiveSheet(results){
  const sheet = document.getElementById('reportSheet');
  if(!sheet) return;
  sheet.querySelectorAll('table tbody tr').forEach((row, ri)=>{
    const cells = row.querySelectorAll('td:not(.select-col)');
    const rr = results[ri];
    if(!rr) return;
    cells.forEach((td, i)=>{
      const r = rr[i];
      if(!r) return;
      // কাস্টম প্রপার্টি হিসেবে বসানো হচ্ছে — স্ক্রিনের সাধারণ CSS এগুলো ব্যবহারই করে না,
      // শুধু @media print নিয়মেই এগুলো পড়া হয়, তাই স্ক্রিনে কোনো প্রভাব পড়ে না
      td.style.setProperty('--fit-size', r.size + 'px');
      td.style.setProperty('--fit-wrap', r.wrapMode);
    });
  });
}
function clearFitResultsFromLiveSheet(){
  const sheet = document.getElementById('reportSheet');
  if(!sheet) return;
  sheet.querySelectorAll('table tbody td').forEach(td=>{
    td.style.removeProperty('--fit-size');
    td.style.removeProperty('--fit-wrap');
  });
}
/* পাতার নিচে ফাঁকা জায়গা না রেখে সব সারিকে সমান করে ছড়িয়ে পুরো পাতা ভরে দেওয়া হয় */
function stretchRowsToFillPage(root){
  const table = root.querySelector('table');
  const tbody = root.querySelector('table tbody');
  const thead = root.querySelector('table thead');
  if(!table || !tbody) return [];

  // ব্রাউজারের mm→px রূপান্তর যাচাই করতে একটা অস্থায়ী ক্যালিব্রেশন এলিমেন্ট ব্যবহার হচ্ছে
  const calib = document.createElement('div');
  calib.style.cssText = 'position:fixed;visibility:hidden;height:285mm;width:0;';
  document.body.appendChild(calib);
  const targetTotalPx = calib.getBoundingClientRect().height;
  calib.remove();

  const rootRect = root.getBoundingClientRect();
  const tableRect = table.getBoundingClientRect();
  const nonTableHeight = rootRect.height - tableRect.height; // হেডার+কর্মীর তথ্য+নোট+স্বাক্ষর অংশ
  const theadHeight = thead ? thead.getBoundingClientRect().height : 0;

  const bodyRows = Array.from(tbody.querySelectorAll('tr'));
  const numRows = bodyRows.length;
  if(numRows===0) return [];

  const currentBodyHeight = bodyRows.reduce((sum,tr)=>sum+tr.getBoundingClientRect().height, 0);
  const availableForBody = targetTotalPx - nonTableHeight - theadHeight;
  const extra = availableForBody - currentBodyHeight;
  const heights = [];
  if(extra > 4){
    const perRowExtra = extra / numRows;
    bodyRows.forEach(tr=>{
      const h = tr.getBoundingClientRect().height + perRowExtra;
      tr.style.height = h + 'px';
      heights.push(h);
    });
  } else {
    bodyRows.forEach(tr=>heights.push(tr.getBoundingClientRect().height));
  }
  return heights;
}
function applyRowHeightsToLiveSheet(heights){
  const sheet = document.getElementById('reportSheet');
  if(!sheet) return;
  sheet.querySelectorAll('table tbody tr').forEach((tr,i)=>{
    if(heights[i]!=null) tr.style.setProperty('--row-h', heights[i] + 'px');
  });
}
function clearRowHeightsFromLiveSheet(){
  const sheet = document.getElementById('reportSheet');
  if(!sheet) return;
  sheet.querySelectorAll('table tbody tr').forEach(tr=>tr.style.removeProperty('--row-h'));
}

/* ================= প্রিন্ট (ফাইলের নামসহ) ================= */
async function printReport(){
  const prevTitle = document.title;
  document.title = reportFileBaseName(CURRENT_MONTH);
  const off = buildOffscreenClone();
  if(off){
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
    const results = autofitCells(off.clone);
    applyFitResultsToLiveSheet(results);
    const heights = stretchRowsToFillPage(off.clone);
    applyRowHeightsToLiveSheet(heights);
    off.wrap.remove();
  }
  let restored = false;
  const restore = ()=>{
    if(restored) return;
    restored = true;
    document.title = prevTitle;
    clearFitResultsFromLiveSheet();
    clearRowHeightsFromLiveSheet();
    window.removeEventListener('afterprint', restore);
  };
  window.addEventListener('afterprint', restore);
  setTimeout(restore, 6000); // afterprint কিছু ব্রাউজারে না এলেও নিরাপত্তার জন্য
  window.print();
}

/* ================= হোয়াটসঅ্যাপে পাঠানোর জন্য PDF (এখন প্রিন্টের মতোই নিখুঁত পদ্ধতিতে) =================
   আগে html2canvas দিয়ে পাতার একটা "ছবি" তুলে PDF বানানো হতো — এটা কখনোই ব্রাউজারের নিজস্ব
   প্রিন্ট ইঞ্জিনের মতো স্বচ্ছ/নিখুঁত হতে পারত না (এটা ওই পদ্ধতির মৌলিক সীমাবদ্ধতা)। তাই এখন
   এই বাটনও প্রিন্ট বাটনের মতোই আসল ব্রাউজার প্রিন্ট ডায়ালগ খোলে — সেখান থেকে "Save as PDF"
   বেছে নিলে প্রিন্টের মতোই নিখুঁত মানের PDF পাওয়া যায়, যা তারপর হোয়াটসঅ্যাপে Attach করা যাবে। */
async function sharePDFToWhatsApp(){
  if(!document.getElementById('reportSheet')) return;
  toast('প্রিন্ট ডায়ালগ খুলছে — সেখানে "Save as PDF" বেছে নিন, তারপর হোয়াটসঅ্যাপ খুলে ফাইলটি Attach করে পাঠান', 6000);
  await printReport();
}
window.addEventListener('beforeunload', function(e){
  if(SAVING_IN_PROGRESS){
    e.preventDefault();
    e.returnValue = '';
  }
});
async function submitMonth(){
  STATE.submitted[CURRENT_MONTH] = new Date().toISOString();
  delete getMonthEntry(CURRENT_MONTH).activeIdx; // জমা দেওয়ার সাথে সাথে সবুজ হাইলাইট মুছে যাবে
  SAVING_IN_PROGRESS = true;
  toast('সংরক্ষণ করা হচ্ছে... একটু অপেক্ষা করুন');
  let ok = false;
  for(let attempt=1; attempt<=3 && !ok; attempt++){
    ok = await saveState();
    if(!ok && attempt<3){
      toast(`সংরক্ষণে সমস্যা হয়েছে, আবার চেষ্টা করা হচ্ছে... (${attempt}/৩)`);
      await new Promise(r=>setTimeout(r, 1200*attempt));
    }
  }
  SAVING_IN_PROGRESS = false;
  renderTab();
  if(ok){
    toast('মাসিক রিপোর্ট জমা হয়েছে ✔ — এখন ফাইল বন্ধ করতে পারেন');
  } else {
    delete STATE.submitted[CURRENT_MONTH];
    renderTab();
    toast('⚠ ৩ বার চেষ্টা করেও সংরক্ষণ ব্যর্থ হয়েছে — নিচে কারণ দেখুন', 6000);
  }
}
async function unsubmitMonth(){
  delete STATE.submitted[CURRENT_MONTH];
  SAVING_IN_PROGRESS = true;
  await saveState();
  SAVING_IN_PROGRESS = false;
  renderTab();
}

  if(!r) return;
  if(['houseFrom','houseTo','newC','cancelC'].includes(field)) val = Number(val)||0;
  r[field]=val; saveState(); renderTab();
}

  saveState(); renderTab();
  toast('নতুন কেন্দ্র সারি যোগ করা হয়েছে');
}

  STATE.centerRows = STATE.centerRows.filter(r=>r.id!==id);
  saveState(); renderTab();
}

    </div>
    <p class="hint" style="margin-top:-6px;margin-bottom:12px;">
      এখানে যোগ/পরিবর্তন/মুছে ফেলা যেকোনো ছুটি "Fill Remark" বাটন চাপলে মাসিক রিপোর্টে স্বয়ংক্রিয়ভাবে বসে যাবে। প্রতি বছরের সরকারি ছুটির তালিকা এখানে আপডেট করে রাখুন।
    </p>
    ${sorted.length?`
    <div style="overflow-x:auto;">
    <table class="setup-table">
      <thead><tr><th>তারিখ</th><th>ছুটির নাম</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>` : `<div class="empty">কোনো ছুটি যোগ করা নেই</div>`}
  </div>`;
}
function updateHoliday(id,field,val){
  const h = STATE.holidays.find(x=>x.id===id);
  if(!h) return;
  h[field]=val; saveState(); renderTab();
}
function addHoliday(){
  const id = 'h'+(STATE.nextHolidayId++);
  STATE.holidays.push({id, date:CURRENT_MONTH+'-01', name:''});
  saveState(); renderTab();
  toast('নতুন ছুটি যোগ করা হয়েছে');
}
function deleteHoliday(id){
  STATE.holidays = STATE.holidays.filter(h=>h.id!==id);
  saveState(); renderTab();
}

/* ================= ইতিহাস ট্যাব ================= */
function allRowsFlat(){
  const out = [];
  Object.keys(STATE.entries).forEach(ym=>{
    STATE.entries[ym].rows.forEach(r=>{
      const info = lookupByCode(r.code);
      if(!info) return;
      out.push({date:r.date, newC:Number(info.row.newC||0), cancelC:Number(info.row.cancelC||0), total:info.total});
    });
  });
  return out;
}
function grandTotalHTML(){
  const from = window._gtFrom || '';
  const to = window._gtTo || '';
  const rows = allRowsFlat().filter(r=>{
    if(from && r.date < from) return false;
    if(to && r.date > to) return false;
    return true;
  });
  const sums = rows.reduce((a,r)=>{a.newC+=r.newC;a.cancelC+=r.cancelC;a.total+=r.total;return a;}, {newC:0,cancelC:0,total:0});
  return `
  <div class="card">
    <h2>বার্ষিক রিপোর্টের জন্য সর্বমোট সংখ্যা খুঁজে নিন</h2>
    <div class="search-box">
      <div class="field" style="max-width:200px;"><label>তারিখ হইতে</label><input type="date" value="${from}" oninput="window._gtFrom=this.value; renderTab();"></div>
      <div class="field" style="max-width:200px;"><label>তারিখ পর্যন্ত</label><input type="date" value="${to}" oninput="window._gtTo=this.value; renderTab();"></div>
    </div>
    <div class="grid">
      <div class="card" style="background:var(--green-soft);text-align:center;padding:14px;">
        <div class="hint">নতুন</div><div style="font-size:22px;font-weight:800;color:var(--green-deep);">${bnNum(sums.newC)}</div>
      </div>
      <div class="card" style="background:var(--red-soft);text-align:center;padding:14px;">
        <div class="hint">বিলুপ্ত</div><div style="font-size:22px;font-weight:800;color:var(--red);">${bnNum(sums.cancelC)}</div>
      </div>
      <div class="card" style="background:var(--gold-soft);text-align:center;padding:14px;">
        <div class="hint">মোট পরিদর্শিত বাড়ি</div><div style="font-size:22px;font-weight:800;color:var(--gold);">${bnNum(sums.total)}</div>
      </div>
    </div>
  </div>`;
}


function exportBackup(){
  const dataStr = JSON.stringify(STATE, null, 2);
  const blob = new Blob([dataStr], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = isoDate(new Date());
  a.href = url;
  a.download = `monthly-report-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('ব্যাকআপ ফাইল ডাউনলোড হয়েছে');
}
function triggerImport(){ document.getElementById('importFileInput').click(); }
function handleImportFile(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try{
      const imported = JSON.parse(e.target.result);
      if(!imported.worker || !imported.centerRows){ toast('ফাইলটি সঠিক ব্যাকআপ ফরম্যাটে নেই'); return; }
      if(!confirm('বর্তমান সব ডেটা মুছে ব্যাকআপ ফাইলের ডেটা বসানো হবে। নিশ্চিত?')) return;
      STATE = migrateState(imported);
      await saveState();
      toast('ব্যাকআপ থেকে ডেটা ফিরিয়ে আনা হয়েছে ✔');
      render();
    }catch(err){
      toast('ফাইলটি পড়া যায়নি — সঠিক ব্যাকআপ ফাইল কিনা দেখুন');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function historyTabHTML(){
  const months = Object.keys(STATE.entries).sort().reverse();
  let searchTerm = window._searchTerm || '';
  let filtered = months.filter(ym=> !searchTerm || ym.includes(searchTerm));

  const listHTML = filtered.length ? filtered.map(ym=>{
    const [y,m]=ym.split('-').map(Number);
    const label = BN_MONTHS[m-1]+' '+bnNum(y);
    const submitted = STATE.submitted[ym];
    const entry = STATE.entries[ym];
    const filledDays = entry.rows.filter(r=>r.code && r.code!=='----').length;
    return `
    <div class="history-item">
      <div>
        <strong>${label}</strong>
        <div class="muted" style="font-size:12px;">${bnNum(filledDays)} দিন পূরণ করা হয়েছে ${submitted?' • জমা: '+new Date(submitted).toLocaleDateString('bn-BD'):''}</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline" onclick="openMonth('${ym}')">দেখুন</button>
        <button class="btn btn-danger" onclick="deleteMonthReport('${ym}')">🗑 ডিলিট</button>
      </div>
    </div>`;
  }).join('') : `<div class="empty">কোনো মাসের রিপোর্ট এখনো তৈরি হয়নি</div>`;

  return `
  <div class="card">
    <div class="top-bar">
      <h2 style="border:none;margin:0;">ইতিহাস ও সার্চ</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-gold btn-sm" onclick="exportBackup()">⬇ ব্যাকআপ ডাউনলোড</button>
        <button class="btn btn-outline btn-sm" onclick="triggerImport()">⬆ ব্যাকআপ থেকে ফিরিয়ে আনুন</button>
        <input type="file" id="importFileInput" accept="application/json" style="display:none;" onchange="handleImportFile(this)">
      </div>
    </div>
    <p class="hint" style="margin-top:-8px;margin-bottom:12px;">
      অন্য ফোন বা কম্পিউটারে সব ডেটা নিয়ে যেতে চাইলে: এখান থেকে "ব্যাকআপ ডাউনলোড" করে ফাইলটা Google Drive/ইমেইলে রাখুন, তারপর অন্য ডিভাইসে এই অ্যাপ খুলে "ব্যাকআপ থেকে ফিরিয়ে আনুন" চাপুন।
    </p>
    <div class="search-box">
      <input type="text" placeholder="মাস খুঁজুন (যেমন 2026-08)" value="${esc(searchTerm)}" oninput="window._searchTerm=this.value; renderTab();">
    </div>
    <div class="history-list">${listHTML}</div>
  </div>
  ${grandTotalHTML()}`;
}
function openMonth(ym){ CURRENT_MONTH=ym; ACTIVE_TAB='entry'; render(); }
async function deleteMonthReport(ym){
  const [y,m] = ym.split('-').map(Number);
  const label = BN_MONTHS[m-1]+' '+bnNum(y);
  if(!confirm(`${label} মাসের পুরো রিপোর্ট স্থায়ীভাবে মুছে ফেলা হবে। আপনি কি নিশ্চিত?`)) return;
  delete STATE.entries[ym];
  delete STATE.submitted[ym];
  const ok = await saveState();
  renderTab();
  toast(ok ? `${label} মাসের রিপোর্ট মুছে ফেলা হয়েছে` : '⚠ মুছতে সমস্যা হয়েছে, আবার চেষ্টা করুন');
}

/* পেইজের যেকোনো খালি জায়গায় (টেবিলের সারির বাইরে) ক্লিক করলে
   "সর্বশেষ এডিট করা সারি"-র সবুজ হাইলাইটটি মুছে যাবে।
   এটি শুধু স্ক্রিনে দেখানো ভিজ্যুয়াল ক্লিয়ার — ডেটা/স্টেট অপরিবর্তিত থাকে,
   তাই পরবর্তী রি-রেন্ডারে (যেমন অন্য সারি এডিট করলে বা Firebase সিঙ্ক হলে) দরকার হলে আবার দেখাবে। */
document.addEventListener('click', function(e){
  if(e.target.closest('tbody tr')) return; // টেবিলের ভেতরের ক্লিক হলে কিছু করার দরকার নেই
  document.querySelectorAll('tbody tr.active-row').forEach(tr=>tr.classList.remove('active-row'));
}, true);

/* ---------------- init ---------------- */
(async function init(){
  STATE = await loadState();
  render();
  initFirebase();
})();
</script>
</body>
</html>
